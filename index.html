<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>2048</h1>
  <div class="top">
      <div class="scoreBox">
          <div>SCORE</div>  
          <span id="score">0</span> 
      </div>  
      <div class="scoreBox">  
          <div>BEST</div>  
          <span id="bestScore">0</span>  
      </div>  
  </div>
  <button id="restart">Новая игра</button>
  <div id="gameContainer">
    <div id="board"></div>
    <div id="gameOver">
        <h2>Game Over!</h2>
    </div>
</div>
  <div id="gameOver">
      <h2>Game Over!</h2>
  </div>
<script src="script.js"></script>
</body>
</html>
